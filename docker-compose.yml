services:

  db:
    image: postgres:15
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - erp_network
    restart: unless-stopped

  web:
    build: .
    env_file: .env
    depends_on:
      - db
    networks:
      - erp_network
    restart: unless-stopped
    volumes:
      - .:/app

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web
    networks:
      - erp_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  erp_network: