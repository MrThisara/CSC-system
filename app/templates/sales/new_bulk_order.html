{% extends "layouts/base.html" %}
{% block title %}New Bulk Order{% endblock %}
{% block page_title %}New Bulk Order{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-8">
        <div class="card shadow-sm">
            <div class="card-header fw-semibold">Bulk Order</div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('sales.process_bulk_order') }}">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                    <div class="mb-4">
                        <label class="form-label fw-semibold">Bulk Buyer</label>
                        <select name="bulk_buyer_id" class="form-select" required>
                            <option value="">Select bulk buyer...</option>
                            {% for b in buyers %}
                            <option value="{{ b.id }}">
                                {{ b.full_name }} — {{ b.phone or b.email or '—' }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>

                    <table class="table" id="items-table">
                        <thead class="table-light">
                            <tr>
                                <th>Product</th>
                                <th>Warehouse Stock</th>
                                <th>Price (JPY)</th>
                                <th>Quantity</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="items-body">
                            <tr id="row-0">
                                <td>
                                    <select name="product_id"
                                            class="form-select form-select-sm"
                                            onchange="updateRow(this, 0)">
                                        <option value="">Select product...</option>
                                        {% for p in products %}
                                        <option value="{{ p.id }}"
                                                data-stock="{{ p.warehouse_stock }}"
                                                data-price="{{ p.selling_price }}">
                                            {{ p.name }}
                                        </option>
                                        {% endfor %}
                                    </select>
                                </td>
                                <td><span id="stock-0">—</span></td>
                                <td><span id="price-0">—</span></td>
                                <td>
                                    <input type="number" name="quantity"
                                           class="form-control form-control-sm"
                                           min="0" step="0.0001" style="width:100px">
                                </td>
                                <td></td>
                            </tr>
                        </tbody>
                    </table>

                    <button type="button" class="btn btn-outline-secondary btn-sm mb-3"
                            onclick="addRow()">
                        <i class="bi bi-plus"></i> Add Another Item
                    </button>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-success btn-lg">
                            Place Bulk Order
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

{% block extra_js %}
<script>
    let rowCount = 1;

    function updateRow(select, index) {
        const option = select.options[select.selectedIndex];
        document.getElementById(`stock-${index}`).textContent =
            option.dataset.stock || '—';
        document.getElementById(`price-${index}`).textContent =
            option.dataset.price ?
            '¥' + parseFloat(option.dataset.price).toLocaleString() : '—';
    }

    function addRow() {
        const tbody = document.getElementById('items-body');
        const row = document.createElement('tr');
        row.id = `row-${rowCount}`;
        row.innerHTML = `
            <td>
                <select name="product_id" class="form-select form-select-sm"
                        onchange="updateRow(this, ${rowCount})">
                    <option value="">Select product...</option>
                    {% for p in products %}
                    <option value="{{ p.id }}"
                            data-stock="{{ p.warehouse_stock }}"
                            data-price="{{ p.selling_price }}">
                        {{ p.name }}
                    </option>
                    {% endfor %}
                </select>
            </td>
            <td><span id="stock-${rowCount}">—</span></td>
            <td><span id="price-${rowCount}">—</span></td>
            <td>
                <input type="number" name="quantity"
                       class="form-control form-control-sm"
                       min="0" step="0.0001" style="width:100px">
            </td>
            <td>
                <button type="button" class="btn btn-sm btn-outline-danger"
                        onclick="this.closest('tr').remove()">
                    <i class="bi bi-trash"></i>
                </button>
            </td>`;
        tbody.appendChild(row);
        rowCount++;
    }
</script>
{% endblock %}
{% endblock %}
